name: Docker CI Test Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker-ci:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Repo info check
      - name: Repository Info
        run: |
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF_NAME"
          ls -la

      # 3. Validate secrets (safe check)
      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "::error::DOCKER_USERNAME is missing"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKER_TOKEN }}" ]; then
            echo "::error::DOCKER_TOKEN is missing"
            exit 1
          fi

          echo "Secrets are available"

      # 4. Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Login to Docker Hub (using TOKEN)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 6. Create dummy Dockerfile
      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM alpine:latest
          RUN echo "Docker CI Test Build"
          CMD ["echo", "Hello from GitHub Actions CI"]
          EOF

      # 7. Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-test:latest .

      # 8. Run container test
      - name: Run Container Test
        run: |
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/ci-test:latest

      # 9. Push Docker image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-test:latest

      # 10. Success message
      - name: CI Success
        run: echo "CI Pipeline completed successfully 🚀"
